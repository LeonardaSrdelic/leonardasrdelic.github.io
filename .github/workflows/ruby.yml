name: Build and Test Jekyll Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '2.7.8'  # Postavlja specifičnu verziju Ruby-a

    - name: Install Bundler
      run: gem install bundler -v 2.4.22  # Instalira specifičnu verziju Bundlera

    - name: Install dependencies
      run: |
        bundle _2.4.22_ install  # Koristi specifičnu verziju Bundlera za instalaciju gemova

    - name: Build the site
      run: |
        bundle exec jekyll build  # Gradnja Jekyll stranice

    - name: Run tests
      run: bundle exec rake  # Primjer kako pokrenuti testove

